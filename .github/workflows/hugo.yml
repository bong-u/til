name: Build and deploy to github pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for .GitInfo and .Lastmod

      - name: Setup Hugo
        env:
          HUGO_VERSION: "0.158.0"
        run: |
          wget -O hugo.tar.gz "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf hugo.tar.gz hugo
          sudo mv hugo /usr/local/bin/
          rm hugo.tar.gz

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Fetch popular pages from GA4
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/ga4-key.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/ga4-key.json node scripts/fetch-popular.js
          rm /tmp/ga4-key.json

      - name: Build Tailwind CSS
        run: npx @tailwindcss/cli -i ./static/css/main.css -o ./static/css/style.css

      - name: Build
        env:
          HUGO_SERVICES_GOOGLEANALYTICS_ID: ${{ secrets.GA_TRACKING_ID }}
        run: hugo --minify

      - name: Run Pagefind
        run: npx pagefind --site "public"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
