<!DOCTYPE html>
<html lang="ko">
<head>
	<title>{{ .Page.Title }}</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="{{ .Summary | truncate 100}}" />
	<meta property="og:site_name" content="{{ .Site.Title }}" />
	<meta property="og:title" content="{{ .Page.Title }}" />
	<meta property="og:description" content="{{ .Summary | truncate 100}}" />
	<meta property="og:type" content="blog" />
	<meta property="og:url" content="https://github.com/bong-u/til-hugo" />
	<meta property="og:image" content="{{ .Site.BaseURL }}asset/thumbnail.jpg" />
	<meta name="twitter:card" content="summary" />
	<meta name="twitter:title" content="{{ .Page.Title }}" />
	<meta name="twitter:description" content="{{ .Summary | truncate 100 }}" />
	<meta name="twitter:image" content="{{ .Site.BaseURL }}asset/thumbnail.jpg" />
	<link rel="canonical" href="{{ .Permalink }}" />

	<!-- Resource Hints: 외부 도메인 사전 연결 -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	{{ if not hugo.IsServer }}
	<link rel="preconnect" href="https://www.googletagmanager.com">
	{{ end }}

	<!-- my custom js -->
	<script defer type="text/javascript" src="{{ .Site.BaseURL }}script/base.js"></script>

	<!-- my favicon -->
	<link rel="icon" href="{{ .Site.BaseURL }}favicon16.png" sizes="16x16">
	<link rel="icon" href="{{ .Site.BaseURL }}favicon32.png" sizes="32x32">
	<link rel="icon" href="{{ .Site.BaseURL }}favicon48.png" sizes="48x48">
	<link rel="icon" href="{{ .Site.BaseURL }}favicon64.png" sizes="64x64">

	<!-- Google Fonts (display=swap으로 FOIT 방지) -->
	<link rel="preload" href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300&display=swap" as="style">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300&display=swap" />

	<!-- my tailwind css -->
	<link id="twCSS" rel="stylesheet" href="{{ .Site.BaseURL }}css/style.css" />

	<!-- google analytics -->
	{{ if not hugo.IsServer }}
	{{ partial "google-analytics.html" . }}
	{{ end }}

</head>

<body class="custom-scroll">


	<div class="flex w-full flex-col items-center">

		{{ block "main" .}} {{ end }}

	</div>
	<!-- {{ block "footer" . }} {{ end }} -->
</body>

</html>
